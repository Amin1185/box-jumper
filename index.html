<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Box Jumper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
      <div class="control-group">
        <button class="btn-control" id="btnLeft" aria-label="Move Left">
          <svg viewBox="0 0 24 24">
            <path d="M14 7l-5 5 5 5V7z"/>
          </svg>
        </button>
        <button class="btn-control" id="btnRight" aria-label="Move Right">
          <svg viewBox="0 0 24 24">
            <path d="M10 17l5-5-5-5v10z"/>
          </svg>
        </button>
      </div>
      <div class="control-group">
        <button class="btn-control" id="btnRotate" aria-label="Rotate">
          <svg viewBox="0 0 24 24">
            <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
          </svg>
        </button>
        <button class="btn-control" id="btnJump" aria-label="Jump">
          <svg viewBox="0 0 24 24">
            <path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14l-6-6z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
